# Production deployment — nginx reverse proxy + PostgreSQL.
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stmtcat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-statements}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - uploads_data:/app/data/uploads
    env_file:
      - ./backend/.env
    environment:
      # Override SQLite with PostgreSQL for production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stmtcat}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-statements}
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /app/data/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # mount your TLS certs here for HTTPS
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
